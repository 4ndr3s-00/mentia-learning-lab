<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentia - Mis actividades</title>

    <link rel="stylesheet" href="styleactividades.css">

    <!-- Iconos -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="layout">

    <!-- ===== BARRA LATERAL ===== -->
    <aside class="sidebar">

        <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i>
            <div>
                <h2>mentia</h2>
                <span>ACADEMIC MENTOR</span>
            </div>
        </div>

        <nav>
            <a href="#"><i class="fa-solid fa-house"></i> Inicio</a>
            <a href="#"><i class="fa-solid fa-upload"></i> Subir actividad</a>
            <a href="#"><i class="fa-solid fa-brain"></i> Análisis IA</a>
            <a href="#"><i class="fa-regular fa-calendar"></i> Plan de estudio</a>
            <a href="#"><i class="fa-solid fa-chart-line"></i> Historial de progreso</a>
            <a href="#" class="activo"><i class="fa-regular fa-folder"></i> Mis actividades</a>
            <a href="#"><i class="fa-solid fa-trophy"></i> Logros</a>
            <a href="#"><i class="fa-solid fa-gear"></i> Ajustes</a>
        </nav>

        <div class="sidebar-abajo">
            <a href="#"><i class="fa-regular fa-circle-question"></i> Ayuda</a>
            <button class="btn-chat">Chatear ahora</button>
        </div>

    </aside>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <main class="contenido">

        <div class="topbar">
            <i class="fa-regular fa-bell"></i>
            <img class="avatar" src="" alt="avatar">
        </div>

        <p class="breadcrumb">Inicio <i class="fa-solid fa-chevron-right"></i> <strong>Mis Actividades</strong></p>

        <h1>Historial de entregas</h1>

        <!-- aqui se dibujan las tarjetas con javascript -->
        <div id="lista-actividades" class="tarjetas"></div>

    </main>

</div>

<script src="scriptactividades.js"></script>
</body>
</html>
